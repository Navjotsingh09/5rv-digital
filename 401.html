  /* === DROPDOWN === */
  .dropdown {position:relative;}
  .dropdown > a {position:relative;padding-right:22px;}
  .dropdown > a::after {
    content:"";
    position:absolute;
    right:6px;
    top:50%;
    width:8px;height:8px;
    border-right:2px solid currentColor;
    border-bottom:2px solid currentColor;
    transform:translateY(-50%) rotate(45deg);
    transition:transform .25s ease;
  }
  .dropdown-content {
    position:absolute;
    top:calc(100% + 10px);
    left:50%;
    transform:translateX(-50%);
    opacity:0;

    min-width:220px;
    padding:10px 0;

  /* === HAMBURGER BUTTON (centered lines) === */
.hamburger {

  width:32px;
  height:32px;

  border-radius:8px;
  border:1px solid rgba(0,0,0,0.05);
  cursor:pointer;
  transition:background .25s ease, transform .25s ease;
}
.hamburger div {
  width:18px;
  height:2px;
  background:var(--brand-dark);
  border-radius:2px;
  transition:all .25s ease;
}
/* Centered cross animation */
.hamburger.active div:nth-child(1){

}

      alert('Something went wrong. Please try again.');
      btn.disabled = false; btn.innerHTML = 'Send Message';
    }
  } catch {
    alert('Network error. Please try again.');
    btn.disabled = false; btn.innerHTML = 'Send Message';
  }
}
/* ════════════════════════════════════════════════
   AUTO POPUP — contact form opens directly after 6s
   once per session, with tracking
════════════════════════════════════════════════ */
setTimeout(function() {
  if (!sessionStorage.getItem('5rv_popup_shown')) {
    sessionStorage.setItem('5rv_popup_shown', '1');
    fltOpen('auto_6s');
  }
}, 6000); /* ← change 6000 to adjust delay in milliseconds */
</script>
